# Starter alert pack. Everything routes to Discord via Alertmanager.
# Validate: promtool check rules qincloud.yml

groups:
  - name: qincloud
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target down: {{ $labels.job }}"
          description: "{{ $labels.instance }} ({{ $labels.job }}) has been unreachable for 3m."

      - alert: DiskUsageHigh
        # exclude pseudo/ephemeral filesystems so overlay mounts don't duplicate the root fs
        expr: |
          100 * (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|ramfs|overlay|squashfs"}
                     / node_filesystem_size_bytes{fstype!~"tmpfs|ramfs|overlay|squashfs"})
          > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Disk >85% on {{ $labels.mountpoint }}"
          description: "{{ $labels.device }} at {{ $labels.mountpoint }} is {{ $value | humanize }}% full."

      - alert: MemoryHigh
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory >90% used"
          description: "Memory usage at {{ $value | humanize }}% for 10m (box has 7.7GB total)."

      - alert: ContainerRestartLoop
        # each restart bumps the container's start time; >2 changes in 15m = crash loop
        expr: changes(container_start_time_seconds{name!=""}[15m]) > 2
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is restart-looping"
          description: "{{ $labels.name }} restarted {{ $value }} times in the last 15m."

      # The fast "your app is actually down" page. App containers are NOT scrape
      # targets, so InstanceDown (up==0) never covers them; qincloud_app_up is
      # controld's own probe of each app's container. This is the only alert
      # that pages when a deployed app stops running. The SLO burn alerts
      # (slo.rules.yml) are deliberately slow — this is the fast one.
      - alert: AppDown
        expr: qincloud_app_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "App {{ $labels.app }} is down"
          description: "controld reports {{ $labels.app }} has had no running container for 2m."

      # pg_up / redis_up are the exporters' probes of the datastores themselves:
      # 0 means the store is down even while its exporter (the scrape target) is
      # still up, so InstanceDown would miss a datastore outage entirely.
      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres is down"
          description: "postgres-exporter reports Postgres unreachable for 2m — every app with a database is affected."

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "redis-exporter reports Redis unreachable for 2m."

      # BackupStale placeholder — the backup job (M2) will publish
      # qincloud_backup_last_success_timestamp_seconds (node-exporter textfile
      # collector or pushgateway TBD). Until that metric exists this expr
      # returns an empty vector, so the rule is inert but ready.
      - alert: BackupStale
        expr: time() - qincloud_backup_last_success_timestamp_seconds > 129600 # 36h = one missed nightly + slack
        labels:
          severity: critical
        annotations:
          summary: "Nightly backup is stale"
          description: "Last successful backup was more than 36h ago."
