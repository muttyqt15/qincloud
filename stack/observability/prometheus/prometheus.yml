# Prometheus config — all targets are compose service names on the obs
# network, except caddy which lives on app_net (prometheus joins both).
# Validate: promtool check config prometheus.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Caddy admin API exposes /metrics; requires the edge stack's service to be
  # named "caddy" on app_net and its admin bound beyond localhost (e.g. :2019).
  - job_name: caddy
    static_configs:
      - targets: [caddy:2019]

  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  - job_name: alloy
    static_configs:
      - targets: [alloy:12345]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
