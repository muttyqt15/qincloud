# stack/observability — Prometheus, Grafana, Loki, Alloy, Alertmanager + exporters (M3).
# Run on the box:
#   cd /opt/qincloud/stack/observability && docker compose --env-file /opt/qincloud/.env up -d
#
# ${TS_IP:?} is deliberate: if TS_IP were empty, "${TS_IP}:3000:3000" would
# silently bind 0.0.0.0 and expose admin UIs publicly. Fail loud instead.

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.retention.size=4GB
      # no --web.enable-lifecycle: prometheus sits on app_net (shared with tenant
      # apps), which would let any tenant POST /-/quit or /-/reload. Reload config
      # with: docker compose kill -s SIGHUP prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "${TS_IP:?}:9090:9090" # Tailscale-only admin UI
    networks:
      - obs
      - app_net # to scrape the Caddy admin endpoint (caddy:2019)
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${TS_IP:?}:3000:3000" # Tailscale-only admin UI
    networks:
      - obs
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.5.1
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - obs
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s # ring takes a few seconds to settle on boot

  # Log shipper: Grafana Alloy — Promtail is past EOL (2026-03), Alloy is
  # the supported successor and needs only the docker socket to ship all
  # container logs.
  alloy:
    image: grafana/alloy:v1.9.1
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345 # so prometheus can scrape alloy itself
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - obs
    mem_limit: 256m
    healthcheck:
      # image has bash but no curl/wget; a /dev/tcp connect is enough for liveness
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/12345"]
      interval: 30s
      timeout: 5s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.28.1 # >=0.25 for native discord_configs
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    # compose file-secret (not a bind mount): compose fails loud at up-time if the
    # source file is missing; a bind mount would silently fabricate a root-owned dir
    secrets:
      - discord_webhook
    ports:
      - "${TS_IP:?}:9093:9093" # Tailscale-only admin UI
    networks:
      - obs
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    pid: host # host PID ns so cpu/process metrics are the host's, not the container's
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
      # /proc/net follows the reader's netns even under /host/proc, so these
      # collectors would describe the container veth, not host NICs — drop them
      # rather than export wrong data (use network_mode: host if ever needed)
      - --no-collector.netdev
      - --no-collector.netstat
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    networks:
      - obs
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9100/"]
      interval: 30s
      timeout: 5s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    restart: unless-stopped
    command:
      - --docker_only=true
      - --housekeeping_interval=30s # default 1s burns CPU on a 4-vCPU box
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - obs
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    restart: unless-stopped
    environment:
      # e.g. postgresql://monitor:<pass>@postgres:5432/postgres?sslmode=disable
      # ("postgres" = the data stack's service name on data_net)
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN:?}
    networks:
      - obs
      - data_net # postgres is reachable on data_net only
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9187/"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis-exporter:
    image: oliver006/redis_exporter:v1.74.0-alpine # -alpine: default tag is FROM scratch, no shell for healthcheck
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379 # data stack's service name on data_net
      REDIS_PASSWORD: ${REDIS_PASSWORD:-} # empty is valid iff redis runs authless on data_net
    networks:
      - obs
      - data_net # redis is reachable on data_net only
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9121/"]
      interval: 30s
      timeout: 5s
      retries: 3

secrets:
  discord_webhook:
    file: /opt/qincloud/secrets/discord_webhook # gitignored; create before first up

networks:
  obs: {} # project-internal scrape/query plane; nothing outside this stack needs it
  app_net:
    external: true
  data_net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  alloy_data:
