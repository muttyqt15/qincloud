# stack/data — Postgres + Redis, private data_net only. Never published.
# Run on the box:
#   cd /opt/qincloud/stack/data && docker compose --env-file /opt/qincloud/.env up -d
name: qincloud-data

services:
  postgres:
    image: postgres:16.9-alpine
    # fixed name: scripts/backup.sh targets the container by name
    container_name: qincloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in /opt/qincloud/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in /opt/qincloud/.env}
      # consumed by initdb/01-controld.sh on first boot of a fresh volume:
      # the dedicated controld role's password (CONTROLD_DSN uses this role,
      # never the cluster superuser)
      CONTROLD_DB_PASSWORD: ${CONTROLD_DB_PASSWORD:?set CONTROLD_DB_PASSWORD in /opt/qincloud/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # runs ONLY on a fresh pgdata volume — see initdb/01-controld.sh for
      # the one-time commands on an already-initialized box
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks:
      - data_net
      # tenant apps deployed with -db reach postgres here; per-role passwords
      # (controld provision -postgres) do the authorization, this network does
      # the reachability.
      - tenant_db_net
    # default 64mb /dev/shm stalls parallel workers and big sorts
    shm_size: 128mb
    mem_limit: 1g
    healthcheck:
      # $$ so the check reads the container's own env, not compose interpolation
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # One-shot: converge the aclfile before redis starts. TWO reasons it must
  # exist and carry a `user default` line (runbooks/gotchas/data-services.md):
  # redis REFUSES to boot when its configured aclfile is missing, and at boot
  # the aclfile REPLACES the whole user table — a file without a default line
  # leaves the default user PASSWORDLESS (requirepass is ignored entirely
  # when an aclfile is configured; verified live on 7.4.2 during rollout).
  # So this init rewrites exactly the default line from REDIS_PASSWORD on
  # every up, making .env the single owner of the platform password, and
  # never touches the tenant user lines that controld provision manages.
  redis-acl-init:
    image: redis:7.4.2-alpine
    restart: "no"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in /opt/qincloud/.env}
    entrypoint:
      - sh
      - -ec
      # $$ so the vars are the container's, not compose interpolation
      - |
        hash=$$(printf %s "$$REDIS_PASSWORD" | sha256sum | cut -d" " -f1)
        touch /data/users.acl
        grep -v "^user default " /data/users.acl > /data/.users.acl.tmp || true
        printf 'user default on #%s ~* &* +@all\n' "$$hash" >> /data/.users.acl.tmp
        mv /data/.users.acl.tmp /data/users.acl
        chown redis:redis /data/users.acl
        chmod 600 /data/users.acl
    volumes:
      - redisdata:/data

  redis:
    image: redis:7.4.2-alpine
    # fixed name: scripts/backup.sh targets the container by name
    container_name: qincloud-redis
    restart: unless-stopped
    depends_on:
      redis-acl-init:
        condition: service_completed_successfully
    # AOF on: RDB snapshots alone can lose everything since the last save.
    # Auth lives ENTIRELY in the aclfile (seeded by redis-acl-init above):
    # the default user is the platform admin identity (healthcheck,
    # backup.sh, exporter); tenant apps authenticate as per-app ACL users
    # (controld provision -redis) confined to their own <app>:* key prefix.
    # No --requirepass on purpose — with an aclfile it is dead config, and a
    # dead knob that looks like the password owner is how a rotation silently
    # doesn't happen. Rotate by updating .env then `docker compose up -d`
    # (recreate re-runs the init, which converges the default line).
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--aclfile", "/data/users.acl",
        "--maxmemory", "256mb",
        "--maxmemory-policy", "noeviction",
      ]
    environment:
      # redis-cli auto-authenticates from this — keeps the healthcheck, the
      # docker-exec redis-cli calls in scripts/backup.sh, and controld's
      # provisioning execs working without ever putting the password in argv
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - data_net
      # tenant apps deployed with -db reach redis here; per-app ACL users do
      # the authorization, this network does the reachability
      - tenant_db_net
    # headroom above maxmemory for the fork/COW spike during BGSAVE
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:

networks:
  data_net:
    external: true
  tenant_db_net:
    external: true # created by bootstrap.sh
