# stack/edge/compose.yml — Caddy edge proxy. The ONLY stack allowed to publish
# public ports (80/443); everything else stays on bridge networks behind it.
#
# Run on the box (env-file REQUIRED since the dash.sparboard.com auth hash):
#   docker compose --project-directory /opt/qincloud/stack/edge --env-file /opt/qincloud/.env up -d

services:
  caddy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    # The image's default CMD plus --resume. Routes controld programs via the
    # admin API live only in Caddy's runtime config; Caddy autosaves every API
    # change to /config/caddy/autosave.json (persisted in the caddy_config
    # volume), and --resume boots from that autosave when it exists. Without
    # it, ANY restart — host reboot, OOM-kill under mem_limit, image bump,
    # compose recreate — reloads the bare Caddyfile and silently unroutes
    # every deployed app: containers keep running (unless-stopped), the store
    # still says live, but every request gets the catch-all 200.
    # TRADEOFF: once autosave.json exists, Caddyfile edits no longer apply at
    # boot — the Caddyfile is the first-boot seed only. To apply an edit,
    # reload it explicitly (this replaces the autosave and DROPS all
    # controld-programmed routes; re-deploy each app afterwards):
    #   docker compose --project-directory /opt/qincloud/stack/edge \
    #     exec caddy caddy reload --config /etc/caddy/Caddyfile
    # Note --resume does not cover a rebuilt box (fresh volume, no autosave):
    # restoring routes from the controld DB needs a reconcile in controld.
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile --resume
    environment:
      # bcrypt hash for the dash.sparboard.com basic_auth (Caddyfile reads it
      # at runtime as {env.DASH_PASSWORD_HASH}). Generate:
      #   docker exec edge-caddy-1 caddy hash-password --plaintext '<password>'
      # CRITICAL: a bcrypt hash is "$2a$14$...". Compose interpolates $ in
      # .env values, so the raw hash gets mangled (every "$x" eaten as an
      # empty variable) and basic_auth then rejects the correct password.
      # Store it in /opt/qincloud/.env with every $ DOUBLED:
      #   DASH_PASSWORD_HASH=$$2a$$14$$...
      DASH_PASSWORD_HASH: ${DASH_PASSWORD_HASH:?set DASH_PASSWORD_HASH in /opt/qincloud/.env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC) — active once a domain + TLS exist
    # Admin API lives on a unix socket inside the container (see Caddyfile) —
    # never on app_net, never in ports:. controld (M4) drives it via a shared
    # mount of the socket. :2019 serves only read-only Prometheus metrics.
    networks:
      - app_net
      # admin_net carries ONLY caddy ↔ controld ↔ prometheus: the dashboard
      # proxy path and the controld /metrics scrape. Tenant apps (app_net)
      # can reach neither controld nor prometheus through it.
      - admin_net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # /data holds certs + ACME account — must survive recreation or we
      # re-issue on every deploy and hit Let's Encrypt rate limits.
      - caddy_data:/data
      # /config holds caddy/autosave.json — the API-written live config that
      # --resume (see command:) boots from. Must survive recreation or every
      # restart would drop the controld-programmed routes.
      - caddy_config:/config
      # Admin socket dir (see Caddyfile) — shared with stack/controld so it
      # can drive the admin API over the socket, never over a network.
      - caddy_admin:/run/caddy
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app_net:
    external: true
  admin_net:
    external: true # created by bootstrap.sh

volumes:
  caddy_data:
  caddy_config:
  # Explicit name (no compose-project prefix) so stack/controld can mount
  # the same socket dir as `external: true` under a stable name.
  caddy_admin:
    name: caddy_admin
