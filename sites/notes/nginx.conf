# Serve the Quartz static build. Quartz emits clean-URL pages as <slug>.html,
# so try the path, then .html, then a directory index, else the 404 page.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # static assets are content-hashed by Quartz; let them cache hard
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
